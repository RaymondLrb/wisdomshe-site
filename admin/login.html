<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>后台登录 | shedatahk limited</title>
  <link rel="stylesheet" href="../assets/css/wisdomshe.css">
</head>
<body>
  <div class="site-shell">
    <main class="page">
      <section class="section-card" style="max-width: 560px; margin: 60px auto 0;">
        <span class="eyebrow">管理后台</span>
        <h1 style="font-size: 42px;">登录后台</h1>
        <p class="lead">请输入管理员账号和密码后进入后台。</p>
        <form id="loginForm" class="admin-login-form">
          <label class="field"><span>用户名</span><input id="username" type="text" autocomplete="username"></label>
          <label class="field"><span>密码</span><input id="password" type="password" autocomplete="current-password"></label>
          <div class="form-actions"><button class="button button-full" type="submit">登录</button></div>
          <p class="form-status" id="loginStatus"></p>
        </form>
      </section>
    </main>
  </div>
  <script src="../assets/js/runtime-config.js"></script>
  <script>
    (function () {
      const apiRoot = ((window.WISDOMSHE_CONFIG || {}).apiOrigin || 'http://127.0.0.1:8801').replace(/\/$/, '');
      const form = document.getElementById('loginForm');
      const statusNode = document.getElementById('loginStatus');
      form.addEventListener('submit', async (event) => {
        event.preventDefault();
        statusNode.textContent = '正在登录...';
        try {
          const response = await fetch(`${apiRoot}/api/admin/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify({ username: document.getElementById('username').value, password: document.getElementById('password').value })
          });
          const data = await response.json();
          if (!response.ok || !data.success) throw new Error(data.error || '登录失败');
          window.location.href = '/admin/';
        } catch (error) {
          statusNode.textContent = error.message;
          statusNode.className = 'form-status is-error';
        }
      });
    })();
  </script>
</body>
</html>
